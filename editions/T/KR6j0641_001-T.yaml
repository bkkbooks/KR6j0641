body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯如是我聞一時佛在波囉鉢多國星左大城虞彌曩精舍過是夏已至九月二十日有一苾芻名嚩野佉曩時彼苾芻出星左大城往支那城相去四由旬於其路中見一大人身長三丈面長四尺知是文殊師利菩薩即時禮足長跪合掌白菩薩言云何現身而來至此必有因緣菩薩答言如是如是苾芻此閻浮提內諸眾生等當有病苦阿修羅迦樓羅等住須彌山王一面與諸天人互相交戰是故虛空中日月無光星辰不現天人敗已修羅獲勝時諸鬼神因斯得便化女人形惱亂眾生生諸疾病或頭痛腹痛眼耳鼻痛或生癰癤瘰癧痔漏疥癩瘡癬或復瘧病其瘧發時或隔一日二日三日四日乃至風癀痰癊一切惡病又閻浮提內降大風雨或寒或熱或澇或旱五穀不豐人民飢儉悉皆中夭復現虎狼師子藐拏等獸侵損有情奪人精氣如是眾難競來逼惱爾時大人說是事已告苾芻言我有聖最勝陀羅尼增長善根能除諸惡若復有人發清淨心以香華等供養三寶及諸賢聖於七晝夜潔淨齋戒誦此陀羅尼是諸眾難即得消除陀羅尼曰曩謨婆誐嚩覩尾摩攞沒地儼鼻囉誐哩𡁠二合多囉引惹寫怛他誐多寫怛儞也二合他尾摩羅誐哩𡁠二合帝尾摩羅踰儞始引阿攞誐帝阿羅誐帝娑嚩二合引賀曩摩娑哩嚩二合儞嚩囉拏尾瑟劍二合毘曩薩怛二合他引誐多寫怛儞也二合他引呬摩呬摩賀引摩呬娑嚩二合引賀引曩謨虞拏迦囉寫怛他引誐多寫怛儞也二合他引誐誐曩引迦哩誐誐曩三婆吠誐誐曩枳哩底二合帝引娑嚩二合引賀引曩謨三滿多巘度多摩寫怛他引誐多寫怛儞也二合他引三摩曳引娑嚩二合引賀引曩謨阿波囉引𡁠多誐引彌曩娑怛二合他引誐多寫怛儞也二合他引阿摩引摩呬引娑嚩二合引賀引曩謨摩曩娑擔二合婆寫怛他引誐多寫怛儞也二合他引摩曩尾戍弟鉢訥彌二合濕嚩二合哩鉢訥摩二合三婆吠緊迦哩呬旦迦哩曳引娑嚩二合引賀引曩謨薩哩嚩二合沒馱地薩怛嚩二合引喃引曩謨阿哩也二合曼祖室哩二合野怛儞也二合他引惹曳引惹曳引羅麼地二合呬引摩呬引摩賀引摩呬引娑嚩二合引賀引曩謨阿哩也二合引嚩路枳帝引濕嚩二合囉寫地薩怛嚩二合寫怛儞也二合他引誐誐曩引茶曳二合誐誐曩三婆吠引誐誐曩摩特曳二合誐誐曩尾訖蘭二合帝引曀賀曳二合呬娑嚩二合賀引曩謨阿哩也二合三滿多跋捺囉二合寫怛他引誐多寫怛儞也二合他引呬跋捺哩二合摩賀引跋捺哩二合阿蜜哩二合多跋捺哩二合尾誐多囉惹細摩賀引尾誐多囉惹細娑嚩二合引賀引曩莫入阿哩也二合尾摩羅枳哩底二合怛寫怛他引誐多寫阿儞枳哩底二合多薩哩嚩二合𡁠儞去毘嚩日羅二合三婆吠嚩日羅二合鼻捺迦哩娑嚩二合引賀引曩莫薩哩嚩二合沒馱冒地薩怛嚩二合引喃引怛儞也二合他引契多迦囉鼻入嚩二合羅儞曳娑嚩二合引賀引惹敢切婆儞娑擔二合婆儞謨賀儞奔拏哩迦引野娑嚩二合引賀引謨賀難帝難婆儞曳引娑嚩二合引賀引努囉尾努哩曳迦引羅尾訖哩二合帝娑嚩二合引賀散引帝引娑尾二合儞哩嚩二合波儞曳引娑嚩二合引賀引努囉尾努哩曳娑嚩二合引賀引覽摩祖拏引野娑嚩二合引賀引路枳迦路俱多囉引野娑嚩二合引賀引阿倪也二合曩尾輪達儞曳引娑嚩二合引賀引馱引覩迦哩曳引娑嚩二合引賀引彌引伽娑普二合吒曩引野娑嚩二合引賀引沒囉二合憾弭二合誐囉二合賀引野娑嚩二合引賀引薩哩嚩二合迦哩摩二合毘始訖多二合引野娑嚩二合引賀引薩哩嚩二合沒馱毘僧娑訖哩三合多引野娑嚩二合引賀引曀迦室凌二合誐引野娑嚩二合引賀部多引野娑嚩二合引賀引阿部多引野娑嚩二合引賀引薩哩嚩二合引訥契波舍摩引野娑嚩二合引賀引爾時文殊師利菩薩說此聖最勝陀羅尼已告苾芻言汝等依此正法儀則每日志誠發清淨心供七比丘供養三寶及諸賢聖於初夜分作護摩然火能除災患速得消散若有善男子善女人於此正法受持讀誦廣為人說一切諸病皆得除愈復次文殊師利菩薩告苾芻言汝今諦聽此聖最勝陀羅尼有大明力廣利眾生於閻浮提所有國界城邑聚落處處流轉令諸眾生聽聞受持若善男子善女人能於此經讀誦一遍自身病苦速得除愈若讀兩遍妻子男女所有病苦悉得除愈若讀三遍一切眷屬所有病苦悉得除愈若讀四遍一國人民所有病苦悉得除愈若讀五遍王之封境諸小國土一切人民皆獲安樂無諸疾病復次文殊師利菩薩言今此正法利益廣大甚為希有速為流傳令諸有情獲上功德若於此經心生輕慢不為受持讀誦不為人演說流傳國界之內一切眾生如不得聽聞者彼人獲過如五逆罪是故苾芻於聖最勝陀羅尼信敬受持無令忘失彼須彌山王一面住者天及阿修羅乾闥婆等我自調伏使閻浮提眾生獲大安樂時文殊師利說是法已忽然不現嚩野佉曩苾芻聞其所說心大歡喜信受奉行
